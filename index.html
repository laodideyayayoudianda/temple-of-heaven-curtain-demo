<!doctype html>
<html lang="zh-CN"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="An interactive editorial portrait of Beijing's Temple of Heaven.">
  <link rel="preload" href="assets/temple-roof-cutout-web.webp" as="image" type="image/webp" fetchpriority="high">
  <title>Temple of Heaven</title>
  <style>
    :root {
      --paper: #e8dfca;
      --ink: #2e251f;
      --muted: #70665b;
      --hairline: rgba(46, 37, 31, .36);
      --panel: rgba(232, 223, 202, .93);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body { background: var(--paper); color: var(--ink); font-family: Arial, Helvetica, sans-serif; }
    button, input { font: inherit; }

    .artboard {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
      background:
        repeating-linear-gradient(91deg, rgba(46, 37, 31, .022) 0 1px, transparent 1px 11px),
        repeating-linear-gradient(2deg, rgba(46, 37, 31, .017) 0 1px, transparent 1px 14px),
        radial-gradient(circle at 53% 16%, rgba(255,255,255,.26), transparent 34%),
        var(--paper);
    }

    .artboard::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: .14;
      background-image:
        radial-gradient(circle at 24% 31%, currentColor 0 .5px, transparent .65px),
        radial-gradient(circle at 71% 56%, currentColor 0 .45px, transparent .6px);
      background-size: 9px 11px, 13px 15px;
      mix-blend-mode: multiply;
    }

    #curtain { position: absolute; inset: 0; z-index: 2; width: 100%; height: 100%; cursor: none; touch-action: none; }

    .masthead {
      position: absolute;
      z-index: 8;
      top: 28px;
      left: clamp(24px, 5vw, 94px);
      right: clamp(24px, 5vw, 94px);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 28px;
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--muted);
    }

    .nav { display: flex; gap: 28px; }
    .nav a { color: inherit; text-decoration: none; }
    .nav a:hover { color: var(--ink); }

    .masthead-actions {
      grid-column: 2;
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .configure {
      border: 0;
      padding: 7px 13px 6px;
      color: var(--paper);
      background: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      cursor: pointer;
      clip-path: polygon(4% 6%, 96% 0, 100% 91%, 2% 100%);
    }

    .temple {
      position: absolute;
      z-index: 4;
      top: clamp(48px, 6vh, 72px);
      left: 50%;
      width: min(620px, 62vw);
      transform: translateX(-50%);
      pointer-events: none;
    }

    .temple img {
      width: 100%;
      height: auto;
      display: block;
      mix-blend-mode: multiply;
      filter:
        drop-shadow(34px 38px 18px rgba(46, 37, 31, .19))
        drop-shadow(70px 64px 34px rgba(46, 37, 31, .10));
    }

    .temple picture { display: block; }

    .destination {
      position: absolute;
      z-index: 6;
      top: 29%;
      width: 60px;
      min-height: 68px;
      display: grid;
      place-content: center;
      gap: 5px;
      border: 1px solid var(--hairline);
      background: transparent;
      color: var(--ink);
      font: 12px/1 Georgia, "Times New Roman", serif;
      pointer-events: none;
    }

    .destination::before { content: ""; width: 26px; height: 7px; margin: auto; border-top: 2px solid currentColor; border-radius: 50%; }
    .destination.left { left: clamp(24px, 6vw, 108px); }
    .destination.right { right: clamp(24px, 6vw, 108px); }

    .headline {
      position: absolute;
      z-index: 6;
      left: clamp(28px, 6vw, 112px);
      bottom: clamp(38px, 8vh, 92px);
      width: min(330px, 31vw);
      pointer-events: none;
    }

    .eyebrow { margin: 0 0 16px; font: 12px/1.3 ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); }
    h1 { margin: 0; font: 500 clamp(48px, 5.5vw, 86px)/.86 Georgia, "Times New Roman", serif; letter-spacing: 0; }
    .rule { display: inline-block; width: 76px; margin-left: 15px; border-top: 1px solid var(--ink); transform: translateY(-.35em); }

    .caption {
      position: absolute;
      z-index: 6;
      right: clamp(28px, 8vw, 152px);
      bottom: clamp(52px, 11vh, 126px);
      width: min(220px, 20vw);
      margin: 0;
      color: var(--muted);
      font: 11px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      pointer-events: none;
    }

    .progress { position: absolute; z-index: 6; left: 50%; bottom: 22px; width: 140px; height: 2px; transform: translateX(-50%); background: rgba(46,37,31,.18); }
    .progress::before { content: ""; display: block; width: 42%; height: 100%; background: rgba(46,37,31,.55); }

    .cursor {
      position: absolute;
      z-index: 12;
      width: 12px;
      height: 12px;
      border: 1px solid rgba(46, 37, 31, .72);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
    }

    .artboard.is-active .cursor { opacity: 1; }

    .settings {
      position: absolute;
      z-index: 20;
      top: 62px;
      right: clamp(24px, 5vw, 94px);
      width: 238px;
      padding: 16px;
      border: 1px solid var(--hairline);
      background: var(--panel);
      box-shadow: 16px 18px 32px rgba(46, 37, 31, .12);
      backdrop-filter: blur(8px);
    }

    .settings[hidden] { display: none; }
    .setting { display: grid; gap: 6px; margin-bottom: 13px; }
    .setting label { display: flex; justify-content: space-between; color: var(--muted); font: 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace; }
    .setting input { width: 100%; accent-color: var(--ink); }
    .reset { width: 100%; border: 1px solid var(--hairline); padding: 7px 10px; color: var(--ink); background: transparent; cursor: pointer; font: 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace; }

    @media (max-width: 720px) {
      .nav { display: none; }
      .temple { top: 66px; width: min(520px, 96vw); }
      .destination { top: 24%; transform: scale(.86); }
      .destination.left { left: 16px; }
      .destination.right { right: 16px; }
      .headline { left: 24px; bottom: 38px; width: min(285px, 72vw); }
      h1 { font-size: clamp(42px, 14vw, 66px); }
      .caption { display: none; }
      .progress { display: none; }
    }
  </style>
</head>
<body>
  <main class="artboard" id="artboard">
    <canvas id="curtain" aria-label="天坛屋檐下可交互的中文珠帘" width="2561" height="1398"></canvas>

    <header class="masthead">
      <nav class="nav" aria-label="Primary"><a href="#home">Home</a><a href="#temple">Destinations</a><a href="#story">Community</a></nav>
      <div class="masthead-actions">
        <button class="configure" id="configure" type="button" aria-expanded="false" aria-controls="settings">Configure</button>
      </div>
    </header>

    <div class="temple" id="temple">
      <picture>
        <source srcset="assets/temple-roof-cutout-web.webp" type="image/webp">
        <img src="assets/temple-roof-cutout-web.png" width="901" height="730" fetchpriority="high" decoding="async" alt="天坛祈年殿屋顶">
      </picture>
    </div>
    <div class="destination left"><span>Vietnam</span></div>
    <div class="destination right"><span>Japan</span></div>

    <section class="headline" id="home">
      <p class="eyebrow">北京 (Beijing) / 天地之间</p>
      <h1>Temple<br>of Heaven<span class="rule"></span></h1>
    </section>

    <p class="caption" id="story">A celestial dialogue between round skies and square earth, where emperors once prayed for the year's harmony.</p>
    <div class="progress" aria-hidden="true"></div>
    <div class="cursor" id="cursor" aria-hidden="true" style="left: 1373.33px; top: 502.333px;"></div>

    <aside class="settings" id="settings" hidden="">
      <div class="setting"><label for="strength">Strength <output id="strengthValue">72</output></label><input id="strength" type="range" min="20" max="110" value="72"></div>
      <div class="setting"><label for="reach">Reach <output id="reachValue">34</output></label><input id="reach" type="range" min="18" max="56" value="34"></div>
      <div class="setting"><label for="inertia">Inertia <output id="inertiaValue">97</output></label><input id="inertia" type="range" min="86" max="99" value="97"></div>
      <button class="reset" id="reset" type="button">Reset curtain</button>
    </aside>
  </main>

  <script>
    (() => {
      const artboard = document.getElementById('artboard');
      const canvas = document.getElementById('curtain');
      const ctx = canvas.getContext('2d');
      const cursor = document.getElementById('cursor');
      const temple = document.getElementById('temple');
      const configure = document.getElementById('configure');
      const settings = document.getElementById('settings');
      const reset = document.getElementById('reset');
      const chains = [];
      let glyphs = '天坛祈年风调雨顺天地玄黄日月星辰礼乐文明北京春秋山川云海';
      const mouse = { x: -999, y: -999, oldX: -999, oldY: -999, active: false };
      const physics = { strength: .72, radius: 34, friction: .965, gravity: .18 };
      const sound = {
        context: null,
        output: null,
         lastStrike: [],
         lastGlobal: 0,
         voices: 0,
         strikes: 0,
         cuePlayed: false,
         scale: [523.25, 587.33, 659.25, 783.99, 880, 1046.5, 1174.66, 1318.51, 1567.98, 1760]
       };
      let width = 0;
      let height = 0;
      let dpr = 1;

      function unlockSound() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        if (!sound.context) {
          const context = new AudioContext();
          const output = context.createGain();
          const compressor = context.createDynamicsCompressor();
          const delay = context.createDelay(.3);
          const feedback = context.createGain();
          const wet = context.createGain();

          output.gain.value = .62;
          compressor.threshold.value = -18;
          compressor.ratio.value = 3;
          delay.delayTime.value = .11;
          feedback.gain.value = .14;
          wet.gain.value = .13;

          output.connect(compressor);
          output.connect(delay);
          delay.connect(feedback);
          feedback.connect(delay);
          delay.connect(wet);
          wet.connect(compressor);
          compressor.connect(context.destination);
          sound.context = context;
          sound.output = output;
        }
        const markReady = () => {
          document.documentElement.dataset.audioState = sound.context.state;
          if (sound.context.state !== 'running' || sound.cuePlayed) return;
          sound.cuePlayed = true;
          ringBell(783.99, .052, 1.05, -.08);
          ringBell(1046.5, .038, .9, .08, .13);
        };

        if (sound.context.state === 'suspended') {
          sound.context.resume().then(markReady).catch(() => {});
        } else {
          markReady();
        }
      }

      function ringBell(frequency, level, duration, pan = 0, delay = 0) {
        const context = sound.context;
        if (!context || context.state !== 'running' || sound.voices >= 10) return;

        sound.voices += 1;
        sound.strikes += 1;
        document.documentElement.dataset.bellStrikes = String(sound.strikes);

        const start = context.currentTime + delay;
        const spatial = context.createStereoPanner ? context.createStereoPanner() : context.createGain();
        if (spatial.pan) spatial.pan.setValueAtTime(pan, start);
        spatial.connect(sound.output);

        [
          { ratio: 1, amount: 1, decay: 1 },
          { ratio: 2.01, amount: .38, decay: .82 },
          { ratio: 2.71, amount: .22, decay: .68 },
          { ratio: 4.07, amount: .12, decay: .45 },
          { ratio: 5.43, amount: .07, decay: .32 }
        ].forEach(partial => {
          const oscillator = context.createOscillator();
          const envelope = context.createGain();
          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(frequency * partial.ratio, start);
          oscillator.detune.setValueAtTime((Math.random() - .5) * 7, start);
          envelope.gain.setValueAtTime(.0001, start);
          envelope.gain.exponentialRampToValueAtTime(level * partial.amount, start + .006);
          envelope.gain.exponentialRampToValueAtTime(.0001, start + duration * partial.decay);
          oscillator.connect(envelope);
          envelope.connect(spatial);
          oscillator.start(start);
          oscillator.stop(start + duration + .08);
        });

        window.setTimeout(() => {
          sound.voices = Math.max(0, sound.voices - 1);
          spatial.disconnect();
        }, (delay + duration + .18) * 1000);
      }

      function strikeChain(columnIndex, impact, x) {
        const context = sound.context;
        if (!context || context.state !== 'running' || impact < 1.1) return;

        const timestamp = performance.now();
        if (timestamp - (sound.lastStrike[columnIndex] || 0) < 95) return;
        if (timestamp - sound.lastGlobal < 28 || sound.voices >= 8) return;

        sound.lastStrike[columnIndex] = timestamp;
        sound.lastGlobal = timestamp;
        const frequency = sound.scale[columnIndex % sound.scale.length];
        const level = .028 + Math.min(impact, 18) / 18 * .075;
        const duration = .72 + Math.random() * .32;
        const pan = Math.max(-.9, Math.min(.9, x / width * 2 - 1));
        ringBell(frequency, level, duration, pan);
      }

      function build() {
        chains.length = 0;
        const narrow = width < 720;
        const columns = narrow ? 16 : 26;
        const templeRect = temple.getBoundingClientRect();
        const artboardRect = artboard.getBoundingClientRect();
        const buildingCenter = templeRect.left - artboardRect.left + templeRect.width * .5;
        const curtainWidth = templeRect.width * .84;
        const left = buildingCenter - curtainWidth / 2;
        const templeTop = templeRect.top - artboardRect.top;
        const roofScale = templeRect.width / 901;
        const centerEdge = templeTop + 682 * roofScale;
        const sideEdge = templeTop + 726 * roofScale;
        const curtainBottom = height - (narrow ? 42 : 48);
        const availableHeight = Math.max(120, curtainBottom - sideEdge);
        const rows = Math.max(18, Math.min(narrow ? 35 : 39, Math.floor(availableHeight / 9.4) + 1));

        for (let column = 0; column < columns; column += 1) {
          const x = left + column * curtainWidth / (columns - 1);
          const normalizedX = Math.abs(column / (columns - 1) * 2 - 1);
          const top = centerEdge + (sideEdge - centerEdge) * Math.pow(normalizedX, 1.7) - 4;
          const segmentLength = Math.max(6.4, (curtainBottom - top) / (rows - 1));
          const readingColumn = columns - 1 - column;
          const chain = [];
          for (let row = 0; row < rows; row += 1) {
            const y = top + row * segmentLength;
            chain.push({
              x, y, oldX: x, oldY: y, anchorX: x, anchorY: y,
              pinned: row === 0,
              restLength: segmentLength,
              char: glyphs[(readingColumn * rows + row) % glyphs.length],
              alpha: .36 + ((column + row * 2) % 6) * .055
            });
          }
          chains.push(chain);
        }
      }

      function resize() {
        const rect = artboard.getBoundingClientRect();
        width = rect.width;
        height = rect.height;
        dpr = Math.min(2, window.devicePixelRatio || 1);
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        build();
      }

      function injectMouseDelta() {
        if (!mouse.active) return;
        const moveX = mouse.x - mouse.oldX;
        const moveY = mouse.y - mouse.oldY;
        const speed = Math.hypot(moveX, moveY);
        if (speed < .01 || speed > 80) return;
        for (let chainIndex = 0; chainIndex < chains.length; chainIndex += 1) {
          const chain = chains[chainIndex];
          let strongestImpact = 0;
          for (let index = 1; index < chain.length; index += 1) {
            const point = chain[index];
            const distance = Math.hypot(point.x - mouse.oldX, point.y - mouse.oldY);
            if (distance >= physics.radius) continue;
            const falloff = 1 - distance / physics.radius;
            strongestImpact = Math.max(strongestImpact, speed * falloff);
            point.x += moveX * physics.strength * falloff;
            point.y += moveY * physics.strength * falloff;
          }
          if (strongestImpact > 0) strikeChain(chainIndex, strongestImpact, chain[0].x);
        }
      }

      function integrate() {
        for (const chain of chains) {
          for (const point of chain) {
            if (point.pinned) continue;
            const velocityX = (point.x - point.oldX) * physics.friction;
            const velocityY = (point.y - point.oldY) * physics.friction;
            point.oldX = point.x;
            point.oldY = point.y;
            point.x += velocityX;
            point.y += velocityY + physics.gravity;
          }
        }
      }

      function constrain() {
        for (let pass = 0; pass < 8; pass += 1) {
          for (const chain of chains) {
            const anchor = chain[0];
            anchor.x = anchor.anchorX;
            anchor.y = anchor.anchorY;
            for (let index = 1; index < chain.length; index += 1) {
              const a = chain[index - 1];
              const b = chain[index];
              const dx = b.x - a.x;
              const dy = b.y - a.y;
              const distance = Math.max(.0001, Math.hypot(dx, dy));
              const difference = (distance - b.restLength) / distance;
              if (a.pinned) {
                b.x -= dx * difference;
                b.y -= dy * difference;
              } else {
                const cx = dx * difference * .5;
                const cy = dy * difference * .5;
                a.x += cx;
                a.y += cy;
                b.x -= cx;
                b.y -= cy;
              }
            }
          }
        }
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#2e251f';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '500 10px ui-monospace, SFMono-Regular, Menlo, monospace';
        for (const chain of chains) {
          for (const point of chain) {
            ctx.globalAlpha = point.alpha;
            ctx.fillText(point.char, point.x, point.y);
          }
        }
        ctx.globalAlpha = 1;
      }

      function frame() {
        integrate();
        constrain();
        draw();
        requestAnimationFrame(frame);
      }

      function enter(event) {
        const rect = canvas.getBoundingClientRect();
        mouse.x = mouse.oldX = event.clientX - rect.left;
        mouse.y = mouse.oldY = event.clientY - rect.top;
        mouse.active = true;
        cursor.style.left = `${mouse.x}px`;
        cursor.style.top = `${mouse.y}px`;
        artboard.classList.add('is-active');
      }

      function move(event) {
        if (!mouse.active) enter(event);
        mouse.oldX = mouse.x;
        mouse.oldY = mouse.y;
        const rect = canvas.getBoundingClientRect();
        mouse.x = event.clientX - rect.left;
        mouse.y = event.clientY - rect.top;
        injectMouseDelta();
        cursor.style.left = `${mouse.x}px`;
        cursor.style.top = `${mouse.y}px`;
      }

      function leave() {
        mouse.active = false;
        artboard.classList.remove('is-active');
      }

      function bindRange(id, outputId, update) {
        const input = document.getElementById(id);
        const output = document.getElementById(outputId);
        input.addEventListener('input', () => {
          const value = Number(input.value);
          output.value = String(value);
          update(value);
        });
      }

      async function loadBodyText() {
        try {
          const response = await fetch('assets/tiantan.txt');
          if (!response.ok) throw new Error(`Unable to load body text: ${response.status}`);
          const characters = (await response.text()).match(/\p{Script=Han}/gu);
          if (characters && characters.length) {
            glyphs = characters.join('');
            build();
          }
        } catch (error) {
          console.warn(error);
        }
      }

      configure.addEventListener('click', () => {
        const open = settings.hidden;
        settings.hidden = !open;
        configure.setAttribute('aria-expanded', String(open));
      });
      reset.addEventListener('click', build);
      bindRange('strength', 'strengthValue', value => { physics.strength = value / 100; });
      bindRange('reach', 'reachValue', value => { physics.radius = value; });
      bindRange('inertia', 'inertiaValue', value => { physics.friction = value / 100; });
      canvas.addEventListener('pointerenter', enter);
      canvas.addEventListener('pointermove', move);
      canvas.addEventListener('pointerleave', leave);
      window.addEventListener('pointerdown', unlockSound, { passive: true });
      window.addEventListener('resize', resize);
      resize();
      loadBodyText();
      frame();
    })();
  </script>


</body></html>
